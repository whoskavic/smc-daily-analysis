services:
  backend:
    build: ./backend
    container_name: smc-backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: sqlite:////app/data/smc_analysis.db
    volumes:
      - db_data:/app/data          # SQLite file persists here
    ports:
      - "8000:8000"                # optional: expose for direct API access

  frontend:
    build: ./frontend
    container_name: smc-frontend
    restart: unless-stopped
    ports:
      - "80:80"                    # access the UI at http://localhost
    depends_on:
      - backend

volumes:
  db_data:                         # named volume keeps DB between restarts
